<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bright Digital | Performance Marketing Agency Auckland NZ</title>
<meta name="description" content="Performance marketing agency in Auckland, NZ. SEO, AEO, Google Ads, paid social, content strategy, marketing automation and CRO. 10x average ROI across 40+ businesses.">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --green:#FFE523;--dark:#0a0a0a;--dark2:#0f0f0f;--dark3:#161616;
  --white:#fff;--gray:#99a1af;--gray2:#c9c9c9;
  --font:'Plus Jakarta Sans',sans-serif;
  --radius:20px;--border:1px solid rgba(255,255,255,.19);
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--dark);color:var(--white);line-height:1.6;overflow-x:hidden}
a{text-decoration:none;color:inherit}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:9999;padding:0 5%;transition:background .3s,backdrop-filter .3s}
.nav.scrolled{background:rgba(10,10,10,.9);backdrop-filter:blur(20px);border-bottom:var(--border)}
.nav-inner{max-width:90rem;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:20px 0}
.nav-logo img{max-width:140px;height:auto}
.nav-links{display:flex;gap:60px;align-items:center;list-style:none}
.nav-links a{color:var(--white);font-size:1rem;font-weight:400;text-transform:uppercase;transition:color .2s}
.nav-links a:hover{color:var(--green)}
.nav-cta{background:var(--white);color:var(--dark)!important;font-weight:500!important;padding:12px 25px;border-radius:50px;box-shadow:0 2px 5px rgba(0,0,0,.2);text-transform:uppercase!important;transition:box-shadow .2s}
.nav-cta:hover{box-shadow:none}
.mobile-toggle{display:none;background:none;border:none;cursor:pointer;padding:.5rem}
.mobile-toggle span{display:block;width:24px;height:2px;background:var(--white);margin:5px 0;transition:.3s}

/* HERO */
.hero{height:95vh;position:relative;overflow:hidden;display:flex;flex-direction:column}
.hero-bg{position:absolute;inset:0;z-index:0;overflow:hidden}
.hero-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.hero-poster{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.hero-overlay{position:absolute;inset:0;background:rgba(0,0,0,.4);z-index:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:0 5%}
.hero-content{display:flex;flex-direction:column;gap:3rem;z-index:2}
.hero h1{font-size:8rem;font-weight:600;line-height:.9;text-align:center;color:var(--white)}
.hero h1 .green{color:var(--green)}
.hero-sub{color:var(--white);font-size:1.2rem;line-height:1.2;font-weight:500;text-align:center;max-width:700px;margin:0 auto}
.hero-buttons{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
.btn-green{background:var(--green);color:var(--dark);padding:12px 50px;border-radius:50px;font-weight:500;font-size:1rem;display:flex;justify-content:center;align-items:center;box-shadow:0 2px 5px rgba(0,0,0,.2);transition:box-shadow .2s;border:none;cursor:pointer;font-family:var(--font)}
.btn-green:hover{box-shadow:none}
.btn-outline{background:transparent;color:var(--white);padding:12px 50px;border-radius:50px;font-weight:500;font-size:1rem;border:1px solid var(--white);display:flex;justify-content:center;align-items:center;cursor:pointer;font-family:var(--font);transition:border-color .2s,background .2s}
.btn-outline:hover{border-color:var(--green);background:rgba(255,229,35,.05)}

/* SECTIONS */
.section{padding:5rem 5%}
.section-inner{max-width:90rem;margin:0 auto}
.section-dark{background:var(--dark2)}
.section-darker{background:var(--dark)}

/* MARKETING INTRO */
.intro-header{display:flex;gap:30px;justify-content:space-between;margin-bottom:5rem}
.intro-heading{max-width:50%}
.intro-text{max-width:50%;color:var(--gray);font-size:1.125rem;line-height:1.5}
.h2{font-size:3rem;font-weight:600;line-height:1.2;color:var(--white)}
.h2-center{text-align:center}
.stats-row{display:flex;flex-wrap:wrap;justify-content:center;gap:15rem}
.stat-item{display:flex;flex-direction:column;align-items:center;gap:1rem}
.stat-num{color:var(--green);font-size:2.5rem;font-weight:600;line-height:1.2}
.stat-label{color:var(--gray);font-size:.875rem;font-weight:500}

/* CARDS (GROW) */
.cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:2rem;margin-top:5rem}
.card{background:var(--dark2);border:var(--border);border-radius:var(--radius);padding:2rem 1.5rem;display:flex;flex-direction:column;gap:1rem;transition:border-color .2s}
.card:hover{border-color:var(--green)}
.card-num{color:var(--green);font-size:3rem;line-height:1.3}
.card-title{color:var(--white);font-size:1.5rem;font-weight:500}
.card-text{color:var(--gray);line-height:1.4}

/* LOGO GRID */
.logo-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:2rem;margin-top:3rem}
.logo-marquee-wrap{overflow:hidden;position:relative;width:100%;margin-top:3rem}
.logo-marquee-wrap::before,.logo-marquee-wrap::after{content:'';position:absolute;top:0;bottom:0;width:80px;z-index:2}
.logo-marquee-wrap::before{left:0;background:linear-gradient(90deg,var(--dark2),transparent)}
.logo-marquee-wrap::after{right:0;background:linear-gradient(270deg,var(--dark2),transparent)}
.logo-track{display:flex;gap:2rem;animation:scrollLogos 25s linear infinite;width:max-content}
.logo-track:hover{animation-play-state:paused}
.logo-pill{background:var(--white);border-radius:16px;width:72px;height:72px;min-width:72px;display:flex;align-items:center;justify-content:center;padding:.8rem}
.logo-pill img{width:40px;height:40px;object-fit:contain}
@keyframes scrollLogos{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.logo-pill span{color:var(--dark);font-weight:600;font-size:.85rem;white-space:nowrap}

/* REVIEWS */
.reviews-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-top:5rem}
.review-card{background:var(--dark);border:var(--border);border-radius:var(--radius);padding:3rem 2rem;display:flex;flex-direction:column;gap:2rem}
.stars{display:flex;gap:.5rem}
.star{width:2rem;height:2rem;color:var(--green)}
.review-text{color:var(--white);line-height:1.5;font-style:italic}
.review-author{color:var(--white);font-weight:600}
.review-role{color:var(--gray);font-size:.85rem}

/* SERVICES */
.services-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.service-card{background:var(--dark2);border:var(--border);border-radius:var(--radius);padding:2.5rem 2rem;display:flex;flex-direction:column;gap:1rem;transition:border-color .2s}
.service-card:hover{border-color:var(--green)}
.service-icon{width:50px;height:50px;background:rgba(255,229,35,.1);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.5rem}
.service-card h3{font-size:1.25rem;font-weight:600}
.service-card p{color:var(--gray);font-size:.95rem;line-height:1.5}

/* PRICING */
.pricing-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.price-card{background:var(--dark2);border:var(--border);border-radius:var(--radius);padding:3rem 2rem;display:flex;flex-direction:column;justify-content:space-between;gap:3rem}
.price-card.featured{border-color:var(--green)}
.price-tier{color:var(--green);font-weight:600;text-transform:uppercase;font-size:.85rem;letter-spacing:.05em}
.price-desc{color:var(--gray2);line-height:1.3;font-weight:500}
.price-amount{color:var(--white);font-size:2rem}
.price-features{list-style:none;display:flex;flex-direction:column;gap:1.5rem;border-top:1px solid rgba(255,255,255,.36);padding-top:2rem}
.price-features li{display:flex;align-items:center;gap:1rem;color:var(--white);line-height:1.4}
.price-features li::before{content:"✓";color:var(--green);font-weight:700;min-width:1.5rem;text-align:center}

/* DIFF GRID */
.diff-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.diff-card{background:var(--dark);border:var(--border);border-radius:var(--radius);padding:2rem 1rem;display:flex;align-items:center;gap:1rem}
.diff-icon{background:var(--dark);color:var(--green);border-radius:50vh;padding:.2rem;display:flex;align-items:center;justify-content:center;width:5rem;height:5rem;min-width:5rem;font-size:2rem}
.diff-text h3{color:var(--white);font-size:1.5rem;line-height:1.4;font-weight:500}

/* PROCESS */
.process-grid{display:grid;grid-template-columns:1fr 1fr;gap:2rem}
.process-card{background:var(--dark);border:var(--border);border-radius:var(--radius);padding:2.5rem 2rem;display:flex;flex-direction:column;gap:1rem}
.process-num{color:var(--green);font-weight:700;font-size:.8rem;letter-spacing:.05em;text-transform:uppercase}
.process-card h3{font-size:1.25rem;font-weight:600}
.process-card p{color:var(--gray);font-size:.95rem;line-height:1.5}
.process-list{list-style:none;display:flex;flex-direction:column;gap:.4rem}
.process-list li{color:var(--gray2);font-size:.9rem;display:flex;gap:.5rem;align-items:center}
.process-list li::before{content:"→";color:var(--green);font-weight:700}

/* CALC */
.calc-wrap{display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:start}
.calc-form{background:var(--dark2);border:var(--border);border-radius:var(--radius);padding:2.5rem}
.calc-form h3{font-size:1.5rem;font-weight:700;margin-bottom:.5rem}
.calc-form>p{color:var(--gray);font-size:.9rem;margin-bottom:2rem}
.calc-field{margin-bottom:1.5rem}
.calc-field label{display:block;font-size:.85rem;font-weight:600;margin-bottom:.5rem;color:var(--gray2)}
.calc-field input{width:100%;padding:.75rem 1rem;background:var(--dark);border:1px solid rgba(255,255,255,.12);border-radius:10px;color:var(--white);font-size:1rem;font-family:var(--font);transition:border-color .2s}
.calc-field input:focus{outline:none;border-color:var(--green)}
.calc-field .hint{font-size:.75rem;color:var(--gray);margin-top:.3rem}
.calc-results{background:var(--dark2);border:1px solid rgba(255,229,35,.25);border-radius:var(--radius);padding:2.5rem;position:sticky;top:6rem}
.calc-results h3{font-size:1.3rem;font-weight:700;margin-bottom:2rem;color:var(--green)}
.calc-item{padding:1rem 0;border-bottom:1px solid rgba(255,255,255,.06)}
.calc-item:last-child{border-bottom:none}
.calc-label{font-size:.85rem;color:var(--gray);margin-bottom:.25rem}
.calc-value{font-size:1.5rem;font-weight:700}
.calc-value.big{color:var(--green);font-size:2rem}
.calc-tabs{display:flex;gap:.5rem;margin-bottom:2rem}
.calc-tab{padding:.6rem 1.5rem;border-radius:var(--radius);font-weight:600;font-size:.9rem;cursor:pointer;transition:all .2s;border:1px solid rgba(255,255,255,.4);background:transparent;color:var(--white);font-family:var(--font)}
.calc-tab.active{background:var(--green);color:var(--dark);border-color:var(--green)}

/* CONTACT */
.contact-grid{display:flex;gap:4rem}
.contact-form-wrap{width:50%;max-width:50%;display:flex;flex-direction:column;gap:.5rem;font-size:14px}
.contact-field-group{display:flex;flex-direction:column;gap:.5rem}
.contact-label{color:var(--gray);line-height:1.2;font-weight:500;text-transform:uppercase}
.contact-input{background:var(--dark);border:1px solid rgba(255,255,255,.11);border-radius:10px;height:50px;padding:0 1rem;color:var(--white);font-family:var(--font);font-size:1rem}
.contact-input:focus{outline:none;border-color:var(--green)}
textarea.contact-input{height:170px;padding:1rem;resize:vertical}
.contact-details{display:flex;flex-direction:column;gap:4rem}
.contact-details-list{display:flex;flex-direction:column;gap:2rem}
.contact-detail{display:flex;gap:1rem;align-items:center}
.contact-icon-box{color:var(--green);background:rgba(255,229,35,.16);border-radius:10px;padding:8px;display:flex;align-items:center;justify-content:center;font-size:1.2rem}
.contact-detail-label{color:rgba(255,255,255,.6);font-size:.875rem;line-height:1.3;font-weight:600;text-transform:uppercase}
.contact-detail-value{color:var(--white);font-size:1rem;line-height:1.2}

/* TEAM */
.team-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem}
.team-card{text-align:center}
.team-avatar{width:100px;height:100px;border-radius:50%;margin:0 auto 1rem;background:linear-gradient(135deg,var(--dark3),rgba(255,229,35,.15));display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:700;color:var(--green)}
.team-card h4{font-size:1rem;font-weight:600;margin-bottom:.2rem}
.team-card p{color:var(--gray);font-size:.85rem}
.team-photo{width:180px;height:180px;border-radius:50%;object-fit:cover;margin:0 auto 1rem;border:2px solid rgba(255,255,255,.1);display:block}

/* PAGE HERO */
.page-hero{padding:15rem 5% 10rem;text-align:center;background:var(--dark)}
.page-hero .h1-gradient{background:linear-gradient(90deg,var(--white) 35%,var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-size:5.375rem;text-align:center;line-height:1.2}
.page-hero .subtext{max-width:80%;color:var(--white);line-height:1.5;font-weight:500;text-align:center;margin:2rem auto 0}

/* CTA BANNER */
.cta-section{background:var(--dark);padding:5rem 5%}
.cta-inner{max-width:90rem;margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:2rem;text-align:center}
.cta-sub{color:var(--gray);max-width:500px}

/* FOOTER */
.footer{border-top:1px solid rgba(255,255,255,.27);padding:70px 5%;display:flex;justify-content:center}
.footer p{color:#919191;font-size:.875rem}

/* FADE ANIM */
.fade-up{opacity:0;transform:translateY(30px);transition:opacity .6s ease,transform .6s ease}
.fade-up.visible{opacity:1;transform:translateY(0)}

/* RESPONSIVE */
@media(max-width:1200px){.pricing-grid{grid-template-columns:1fr 1fr!important}}
@media(max-width:991px){
  .nav-links{display:none}
  .mobile-toggle{display:block}
  .nav-links.open{display:flex;flex-direction:column;position:absolute;top:100%;left:0;right:0;background:var(--dark2);padding:2rem 5%;gap:1.5rem;border-bottom:var(--border)}
  .hero h1{font-size:4rem}
  .intro-header{flex-direction:column}
  .intro-heading,.intro-text{max-width:100%}
  .stats-row{gap:3rem}
  .cards-grid,.reviews-grid,.services-grid,.pricing-grid,.diff-grid,.process-grid{grid-template-columns:1fr!important}
  .calc-wrap{grid-template-columns:1fr}
  .contact-grid{flex-direction:column}
  .contact-form-wrap{width:100%;max-width:100%}
  .page-hero .h1-gradient{font-size:3rem}
  .team-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:600px){
  .hero h1{font-size:2.8rem}
  .h2{font-size:2rem}
  .hero-buttons{flex-direction:column;align-items:stretch}
}
</style>
</head>

+ '<section class="section section-darker"><div class="section-inner"><h2 class="h2 h2-center fade-up">How we make you G.R.O.W</h2><div class="cards-grid"><div class="card fade-up"><div class="card-num">01</div><h3 class="card-title"><strong>G</strong> \u2014 Goals &amp; Strategy</h3><div class="card-text">We start with your business objectives: leads, sales, revenue. Then we analyse your market, competitors and audiences to build a data-driven plan around what will actually get you tangible results.</div></div><div class="card fade-up"><div class="card-num">02</div><h3 class="card-title"><strong>R</strong> \u2014 Run &amp; Test</h3><div class="card-text">We launch campaigns across content, SEO, AEO, paid search, paid social and automation, then test relentlessly. Every channel earns its place with data, not assumptions.</div></div><div class="card fade-up"><div class="card-num">03</div><h3 class="card-title"><strong>O</strong> \u2014 Optimisation</h3><div class="card-text">We monitor performance daily and refine what works. Better targeting, sharper creative, smarter spend allocation. Small gains compound into big results.</div></div><div class="card fade-up"><div class="card-num">04</div><h3 class="card-title"><strong>W</strong> \u2014 Wins That Scale</h3><div class="card-text">You get measurable results: more leads, more sales, stronger ROI. We double down on what delivers and scale it to grow your business over time.</div></div></div></div></section>'

pages['blog-seo-guide'] = '<div class="page-hero" style="padding-bottom:3rem"><div class="price-tier fade-up" style="margin-bottom:1rem">SEO</div><h1 class="h1-gradient fade-up" style="font-size:3.5rem">The NZ Business Guide to SEO in 2026</h1><p class="subtext fade-up">Last updated April 2026 \u00b7 12 min read</p></div>'
+ '<section class="section section-dark"><div class="section-inner" style="max-width:800px"><div class="fade-up" style="color:var(--gray2);font-size:1.05rem;line-height:1.8"><p>Search engine optimisation in New Zealand has changed dramatically. AI Overviews now appear on over 30% of commercial searches. Zero-click results are rising. And the old playbook of stuffing keywords into blog posts no longer works.</p><br><p>But organic search is still the highest-ROI channel for most businesses. The companies that adapt to how search works today will win the next decade of traffic.</p><br><h2 class="h2" style="font-size:1.8rem;margin:2rem 0 1rem">What has changed in 2026</h2><p>Google\u2019s AI Overviews now summarise answers directly in search results. For informational queries, this means fewer clicks to websites. But for commercial and transactional queries, searchers still click through because they need to compare, purchase or contact a business.</p><br><p>This is why keyword intent matters more than ever. Targeting high-volume informational keywords is less valuable if Google answers them directly. Targeting commercial-intent keywords like \u201cSEO agency Auckland\u201d or \u201cSEO services NZ\u201d still drives qualified traffic because searchers want to evaluate and engage with a provider.</p><br><h2 class="h2" style="font-size:1.8rem;margin:2rem 0 1rem">What still works</h2><p><strong style="color:var(--white)">Technical foundations:</strong> Site speed, mobile responsiveness, clean architecture, proper schema markup and crawlability remain non-negotiable.</p><br><p><strong style="color:var(--white)">Content depth:</strong> Thin pages get filtered out. Pages that demonstrate genuine expertise, cover a topic comprehensively and provide actionable value continue to rank.</p><br><p><strong style="color:var(--white)">Authority signals:</strong> Backlinks from relevant, authoritative NZ sites still move the needle. Digital PR, expert commentary and strategic partnerships are the most effective link-building approaches.</p><br><h2 class="h2" style="font-size:1.8rem;margin:2rem 0 1rem">The AEO opportunity</h2><p>AI Engine Optimisation is the practice of structuring your content so AI assistants (ChatGPT, Perplexity, Google Gemini) cite and recommend your business. This means clear entity markup, structured data, FAQ sections and content written in a way that AI models can extract and attribute.</p><br><p>Businesses that invest in AEO now will have a significant advantage as AI-driven discovery becomes mainstream.</p></div><div style="margin-top:3rem;padding-top:2rem;border-top:1px solid rgba(255,255,255,.1)"><a href="#" class="btn-green" onclick="go(\'contact\');return false">Get a free SEO audit for your business</a></div></div></section>';

pages['blog-roas'] = '<div class="page-hero" style="padding-bottom:3rem"><div class="price-tier fade-up" style="margin-bottom:1rem">PAID MEDIA</div><h1 class="h1-gradient fade-up" style="font-size:3.5rem">What is a Good ROAS? NZ Benchmarks by Industry</h1><p class="subtext fade-up">Last updated April 2026 \u00b7 8 min read</p></div>'
+ '<section class="section section-dark"><div class="section-inner" style="max-width:800px"><div class="fade-up" style="color:var(--gray2);font-size:1.05rem;line-height:1.8"><p>Return on Ad Spend (ROAS) measures how much revenue you generate for every dollar spent on advertising. A ROAS of 5x means you earned $5 for every $1 spent.</p><br><p>But what counts as \u201cgood\u201d depends entirely on your industry, margins and business model.</p><br><h2 class="h2" style="font-size:1.8rem;margin:2rem 0 1rem">NZ benchmarks by industry</h2><p><strong style="color:var(--white)">E-commerce (physical products):</strong> 4x-8x ROAS is solid. Margins are typically 30-50%, so you need at least 3x to be profitable after ad spend.</p><br><p><strong style="color:var(--white)">SaaS &amp; subscriptions:</strong> 3x-5x on initial acquisition is strong, because lifetime value usually makes even lower-ROAS campaigns profitable long-term.</p><br><p><strong style="color:var(--white)">Professional services:</strong> 8x-15x is achievable because average deal values are high. A single client worth $10,000+ can justify significant ad spend.</p><br><p><strong style="color:var(--white)">Lead generation:</strong> Measure cost per qualified lead rather than direct ROAS. Under $50 per qualified lead is excellent for most NZ B2B businesses.</p><br><h2 class="h2" style="font-size:1.8rem;margin:2rem 0 1rem">How to improve your ROAS</h2><p>The three fastest levers are: better targeting (reach the right people), better creative (make them click), and better landing pages (make them convert). Most businesses focus only on targeting and ignore their landing page experience, which is often the biggest bottleneck.</p><br><p>Try our <a href="#" onclick="go(\'calculators\');return false" style="color:var(--green);text-decoration:underline">ROAS Calculator</a> to model what your campaigns could deliver.</p></div><div style="margin-top:3rem;padding-top:2rem;border-top:1px solid rgba(255,255,255,.1)"><a href="#" class="btn-green" onclick="go(\'contact\');return false">Get a free Google Ads audit</a></div></div></section>';

+ '<section class="section section-dark"><div class="section-inner" style="max-width:800px"><div class="fade-up" style="color:var(--gray2);font-size:1.05rem;line-height:1.8"><p>AI Engine Optimisation (AEO) is the practice of optimising your digital presence so AI-powered assistants recommend and cite your business. Think of it as SEO for AI.</p><br><p>When someone asks ChatGPT \u201cWhat is the best digital marketing agency in Auckland?\u201d or Google\u2019s AI Overview summarises options for \u201cSEO services NZ\u201d, AEO determines whether your business appears in that answer.</p><br><h2 class="h2" style="font-size:1.8rem;margin:2rem 0 1rem">Why AEO matters now</h2><p>AI assistants are becoming a primary discovery channel. Over 100 million people use ChatGPT weekly. Google AI Overviews appear on a growing percentage of searches. Perplexity, Claude and other AI tools are changing how people research products and services.</p><br><p>The businesses that AI models are trained to recognise as authoritative in their space will capture this traffic. The ones that are invisible to AI will lose ground.</p><br><h2 class="h2" style="font-size:1.8rem;margin:2rem 0 1rem">How to optimise for AI</h2><p><strong style="color:var(--white)">Structured data:</strong> Use schema markup to make your business, services and content machine-readable.</p><br><p><strong style="color:var(--white)">Entity authority:</strong> Build your brand as a recognised entity through consistent mentions, citations and authoritative content.</p><br><p><strong style="color:var(--white)">Clear, citable content:</strong> Write content that AI can extract and attribute. Direct answers, clear definitions, structured formats.</p><br><p><strong style="color:var(--white)">Brand mentions:</strong> Get mentioned on authoritative sites, directories and publications that AI models use as training data.</p></div><div style="margin-top:3rem;padding-top:2rem;border-top:1px solid rgba(255,255,255,.1)"><a href="#" class="btn-green" onclick="go(\'seo\');return false">Learn about our SEO &amp; AEO services</a></div></div></section>';

pages['blog-email'] = '<div class="page-hero" style="padding-bottom:3rem"><div class="price-tier fade-up" style="margin-bottom:1rem">AUTOMATION</div><h1 class="h1-gradient fade-up" style="font-size:3.5rem">5 Email Flows Every NZ Business Needs</h1><p class="subtext fade-up">Last updated April 2026 \u00b7 7 min read</p></div>'
+ '<section class="section section-dark"><div class="section-inner" style="max-width:800px"><div class="fade-up" style="color:var(--gray2);font-size:1.05rem;line-height:1.8"><p>Email marketing delivers the highest ROI of any digital channel. But only if you have the right flows running. Here are the five automated email sequences every NZ business should have active.</p><br><h2 class="h2" style="font-size:1.8rem;margin:2rem 0 1rem">1. Welcome sequence</h2><p>Triggered when someone subscribes or signs up. 3-5 emails over 7-10 days that introduce your brand, deliver value and guide them toward their first purchase or enquiry.</p><br><h2 class="h2" style="font-size:1.8rem;margin:2rem 0 1rem">2. Abandoned cart / abandoned enquiry</h2><p>Triggered when someone starts but does not complete a purchase or form submission. 2-3 emails within 24-48 hours. This flow typically recovers 5-15% of lost conversions.</p><br><h2 class="h2" style="font-size:1.8rem;margin:2rem 0 1rem">3. Post-purchase nurture</h2><p>Triggered after a purchase. Delivery updates, usage tips, cross-sell recommendations and review requests. Builds loyalty and increases lifetime value.</p><br><h2 class="h2" style="font-size:1.8rem;margin:2rem 0 1rem">4. Re-engagement</h2><p>Triggered when a subscriber has not opened or clicked in 60-90 days. Win them back with a compelling offer or let them self-select out to keep your list healthy.</p><br><h2 class="h2" style="font-size:1.8rem;margin:2rem 0 1rem">5. Lead nurture (B2B)</h2><p>Triggered when a lead downloads a resource or attends a webinar but does not enquire. Drip educational content over 4-6 weeks that positions you as the expert and warms them toward a sales conversation.</p></div><div style="margin-top:3rem;padding-top:2rem;border-top:1px solid rgba(255,255,255,.1)"><a href="#" class="btn-green" onclick="go(\'contact\');return false">Set up your email automation</a></div></div></section>';

// ROUTING
function go(page) {
  document.getElementById("app").innerHTML = pages[page];
  window.scrollTo(0, 0);
  document.querySelectorAll(".nav-links a").forEach(function(a) {
    if (a.dataset.p === page) a.style.color = "#FFE523";
    else if (!a.classList.contains("nav-cta")) a.style.color = "";
  });
  document.getElementById("navLinks").classList.remove("open");
  setTimeout(initAnim, 50);
  if (page === "calculators") setTimeout(function() { calcROI(); calcROAS(); }, 100);
}

function initAnim() {
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) { if (e.isIntersecting) e.target.classList.add("visible"); });
  }, { threshold: 0.1, rootMargin: "0px 0px -50px 0px" });
  document.querySelectorAll(".fade-up").forEach(function(el) { obs.observe(el); });
}

window.addEventListener("scroll", function() {
  document.getElementById("mainNav").classList.toggle("scrolled", window.scrollY > 50);
});

function switchCalc(type, btn) {
  document.querySelectorAll(".calc-tab").forEach(function(t) { t.classList.remove("active"); });
  btn.classList.add("active");
  document.getElementById("calc-roi").style.display = type === "roi" ? "grid" : "none";
  document.getElementById("calc-roas").style.display = type === "roas" ? "grid" : "none";
}

function fmt(n) { return n.toLocaleString("en-NZ", { maximumFractionDigits: 0 }); }

function calcROI() {
  var s = parseFloat(document.getElementById("r-spend").value) || 0;
  var cpc = parseFloat(document.getElementById("r-cpc").value) || 1;
  var cvr = parseFloat(document.getElementById("r-cvr").value) || 0;
  var cl = parseFloat(document.getElementById("r-close").value) || 0;
  var acv = parseFloat(document.getElementById("r-acv").value) || 0;
  var clicks = Math.round(s / cpc);
  var leads = Math.round(clicks * cvr / 100);
  var cust = Math.round(leads * cl / 100);
  var rev = cust * acv;
  var roi = s > 0 ? Math.round((rev - s) / s * 100) : 0;
  var el = function(id) { return document.getElementById(id); };
  if (!el("o-clicks")) return;
  el("o-clicks").textContent = fmt(clicks);
  el("o-leads").textContent = fmt(leads);
  el("o-cust").textContent = fmt(cust);
  el("o-rev").textContent = "$" + fmt(rev);
  el("o-roi").textContent = roi + "%";
  el("o-cpl").textContent = leads > 0 ? "$" + fmt(Math.round(s / leads)) : "$0";
  el("o-cpa").textContent = cust > 0 ? "$" + fmt(Math.round(s / cust)) : "$0";
}

function calcROAS() {
  var s = parseFloat(document.getElementById("rs-spend").value) || 0;
  var r = parseFloat(document.getElementById("rs-rev").value) || 0;
  var m = parseFloat(document.getElementById("rs-margin").value) || 0;
  var o = parseFloat(document.getElementById("rs-orders").value) || 1;
  var roas = s > 0 ? (r / s).toFixed(1) : 0;
  var gp = r * m / 100;
  var np = gp - s;
  var el = function(id) { return document.getElementById(id); };
  if (!el("o2-roas")) return;
  el("o2-roas").textContent = roas + "x";
  el("o2-profit").textContent = "$" + fmt(Math.round(gp));
  el("o2-net").textContent = "$" + fmt(Math.round(np));
  el("o2-cpa").textContent = "$" + fmt(Math.round(s / o));
  el("o2-rpo").textContent = "$" + fmt(Math.round(r / o));
  el("o2-ppo").textContent = "$" + fmt(Math.round(gp / o));
}

go("home");
</script>
